<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <div class="homecontainer">
    {% if page.url != '/' %}
    <h1 class="homelogo"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
    {% endif %}

    <main class="page-content" aria-label="Content">
      {{ content }}
    </main>

    <footer class="site-footer" role="contentinfo">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. <a href="{{ '/about/' | relative_url }}">About</a> &mdash; <a href="{{ '/cheatsheet/' | relative_url }}">Cheatsheet</a></p>
    </footer>
  </div>
</body>
</html>
